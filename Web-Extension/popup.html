<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Pass Guard</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div id="app">
    <!-- Login View -->
    <div id="login-view" class="view">
      <h2>Login to Pass Guard</h2>
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="email" placeholder="email@example.com">
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="password" placeholder="Master Password">
      </div>
      <div id="otp-group" class="form-group hidden">
        <label>OTP</label>
        <input type="text" id="otp" placeholder="Enter OTP">
      </div>
      <button id="login-btn">Login</button>
      <p id="error-msg" class="error"></p>
    </div>

    <!-- Dashboard View -->
    <div id="dashboard-view" class="view hidden">
      <div class="header">
        <h3>Shared Passwords</h3>
        <button id="logout-btn">Logout</button>
      </div>
      <input type="text" id="search" placeholder="Search site...">
      <div id="password-list" class="password-list">
        <!-- Passwords will be injected here -->
      </div>
      <p id="dash-msg"></p>
    </div>
  </div>
  <script type="module" src="popup.js"></script>
</body>
</html>
